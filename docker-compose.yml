version: "3.9"

services:
  # ── One-shot ETL setup (run with: docker compose --profile setup up etl) ──
  etl:
    build: .
    image: retailpulse:local
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      PYTHONPATH: /app/src
    command:
      - sh
      - -c
      - |
        uv run python scripts/generate_sample.py && \
        uv run python -m ingestion.loader
    profiles:
      - setup

  # ── FastAPI server ─────────────────────────────────────────────────────────
  api:
    build: .
    image: retailpulse:local
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      PYTHONPATH: /app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Next.js frontend (主要 demo UI) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit dashboard（保留作為 analyst 工具，預設不啟動）───────────────
  app:
    build: .
    image: retailpulse:local
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      PYTHONPATH: /app/src
    command:
      - uv
      - run
      - streamlit
      - run
      - src/app/streamlit_app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    depends_on:
      - api
    profiles:
      - streamlit

  # ── PostgreSQL (reserved for future analytics warehouse integration) ────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: retailpulse
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  postgres_data:
